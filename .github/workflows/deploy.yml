name: Node.js CI (Deploy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
    - run: npm install
    - run: npm run build
    - name: Deploy Update Site
      uses: JamesIves/github-pages-deploy-action@v4.6.1
      with:
        branch: gh-pages 
        folder: build
        clean: true 