name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run citation update script
        shell: bash
        run: |
          for i in {1..3}; do
            timeout 90 bash -c "python bin/update_scholar_citations.py" && break || echo "Retry $i failed"
          done

      - name: Configure Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Commit and push if changed
        run: |
          git add _data/citations.yml
          git diff --staged --quiet || (git commit -m "Update Google Scholar citations" && git push)
